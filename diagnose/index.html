<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixalot.ai — Bildiagnose</title>
  <meta name="description" content="Få en præcis AI-diagnose på dit bilproblem på under 3 minutter. Gratis. Ingen login.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter','Helvetica Neue',Arial,sans-serif; background:#f8fafc; color:#1e293b; -webkit-font-smoothing:antialiased; }
    button { cursor:pointer; border:none; font-family:inherit; }
    textarea, input { font-family:inherit; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    .fadein { animation:fadeUp .5s cubic-bezier(.22,1,.36,1) forwards; }
    .spinner { width:18px;height:18px;border:2px solid rgba(255,255,255,.35);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0; }
    .inp { width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:14px 16px;font-size:15px;background:white;color:#1e293b;outline:none;transition:border-color .15s; }
    .inp:focus { border-color:#2563EB; }
    .btn-primary { display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;border-radius:10px;background:#2563EB;color:white;font-size:16px;font-weight:600;box-shadow:0 4px 16px rgba(37,99,235,.25);transition:all .2s; }
    .btn-primary:hover:not(:disabled) { background:#1d4ed8;transform:translateY(-1px); }
    .btn-primary:disabled { background:#c5cee8;cursor:not-allowed;box-shadow:none; }
    .chip { padding:8px 16px;border-radius:20px;background:white;color:#555;border:1.5px solid #e2e8f0;font-size:13px;font-weight:500;transition:all .15s; }
    .chip:hover { border-color:#2563EB;color:#2563EB; }
    .card { background:white;border:1.5px solid #e2e8f0;border-radius:12px;transition:all .2s; }
    .card:hover { border-color:#c5cee8;box-shadow:0 4px 20px rgba(0,0,0,.07); }
    .choice { width:100%;padding:13px 16px;border-radius:9px;border:1.5px solid #e2e8f0;background:white;color:#555;font-size:14px;font-weight:500;text-align:left;transition:all .15s; }
    .choice:hover { border-color:#2563EB;color:#2563EB; }
    .choice.sel { border-color:#2563EB;background:#EEF2FF;color:#2563EB;font-weight:600; }
    .tab { flex:1;padding:11px 8px;border-radius:8px;font-size:14px;font-weight:500;background:transparent;color:#94a3b8;transition:all .18s; }
    .tab.active { background:white;color:#2563EB;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.08); }
    .skill-btn { width:100%;padding:20px 22px;border-radius:12px;background:white;border:1.5px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;text-align:left;transition:all .2s; }
    .skill-btn:hover { border-color:#2563EB;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module" src="/app.js"></script>
</body>
</html>
